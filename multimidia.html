figure.foto-legenda{

}

    width: 100%;
    height: auto;

}

    background-color: rgba(0,0,0,.4);
    position:absolute;
    top:0px;
    color:white;
    width: 100%;
    height: 100%;
    transition: opacity 1s;
    opacity: 0;
    pointer-events: none;
    padding: 10px;
    box-sizing: border-box;  
}
figure.foto-legenda:hover figcaption{
    opacity: 1;
}
